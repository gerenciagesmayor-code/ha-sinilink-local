name: Sinilink Broker Proxy V2
description: Proxy MQTT local para termostatos Sinilink XY-WFT1. Descubre dispositivos por UDP, responde find/findport y publica estado en Home Assistant. Se reinicia con el sistema.
version: "2.0.0"
slug: sinilink_broker_proxy_v2
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false
startup: application
boot: auto
host_network: true
options:
  mqtt_host: "127.0.0.1"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  ha_host_ip: "192.168.1.121"
  discovery_interval: 300
  poll_interval: 30
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  ha_host_ip: str
  discovery_interval: int
  poll_interval: int
  scan_start_ip: str?
  scan_end_ip: str?
